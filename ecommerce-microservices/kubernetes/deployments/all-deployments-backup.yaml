apiVersion: v1
kind: Namespace
metadata:
  name: clahanstore
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: clahanstore
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: team4devops/ecommerce-api-gateway:v1.0.0
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: clahanstore-config
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: clahanstore
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: team4devops/ecommerce-user-service:v1.0.0
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: '3001'
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: clahanstore-secrets
              key: MONGO_URI_USER
        resources:
          requests:
