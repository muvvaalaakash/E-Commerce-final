apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ecommerce-gateway
  namespace: clahanstore
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: clahanstore
spec:
  parentRefs:
  - name: ecommerce-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: api-gateway
      port: 3000
  - matches:
    - path:
        type: PathPrefix
        value: /user
    backendRefs:
    - name: user-service
      port: 3001
  - matches:
    - path:
        type: PathPrefix
        value: /auth
    backendRefs:
    - name: auth-service
      port: 3002
  - matches:
    - path:
        type: PathPrefix
        value: /product
    backendRefs:
    - name: product-service
      port: 3003
  - matches:
    - path:
        type: PathPrefix
        value: /search
    backendRefs:
    - name: search-service
      port: 3004
  - matches:
    - path:
        type: PathPrefix
        value: /inventory
    backendRefs:
    - name: inventory-service
      port: 3005
  - matches:
    - path:
        type: PathPrefix
        value: /cart
    backendRefs:
    - name: cart-service
      port: 3006
  - matches:
    - path:
        type: PathPrefix
        value: /wishlist
    backendRefs:
    - name: wishlist-service
      port: 3007
  - matches:
    - path:
        type: PathPrefix
        value: /order
    backendRefs:
    - name: order-service
      port: 3008
  - matches:
    - path:
        type: PathPrefix
        value: /payment
    backendRefs:
    - name: payment-service
      port: 3009
  - matches:
    - path:
        type: PathPrefix
        value: /invoice
    backendRefs:
    - name: invoice-service
      port: 3010
  - matches:
    - path:
        type: PathPrefix
        value: /shipping
    backendRefs:
    - name: shipping-service
      port: 3011
  - matches:
    - path:
        type: PathPrefix
        value: /review
    backendRefs:
    - name: review-rating-service
      port: 3012
  - matches:
    - path:
        type: PathPrefix
        value: /recommendation
    backendRefs:
    - name: recommendation-service
      port: 3013
  - matches:
    - path:
        type: PathPrefix
        value: /admin
    backendRefs:
    - name: admin-service
      port: 3014
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend-ui
      port: 80
